<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morning Digest</title>
    <link rel="stylesheet" href="digest-styles.css">
    <script>
        // Apply the stored theme before first paint to avoid a flash of the
        // wrong colour scheme. digest-theme.js owns the theme from then on.
        (function () {
            var pref = localStorage.getItem('theme-preference') || 'auto';
            var dark = pref === 'dark' || (pref === 'auto' &&
                window.matchMedia('(prefers-color-scheme: dark)').matches);
            if (dark) document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
        })();
    </script>
    <!-- digest-theme.js uses `export`, so it must load as a module or it
         throws on parse and never registers <digest-theme-manager>. -->
    <script src="digest-theme.js" type="module"></script>
    <script src="digest-renderer.js" defer></script>
</head>
<body>
    <digest-theme-manager></digest-theme-manager>
    <digest-renderer src="digest.md"></digest-renderer>
</body>
</html>
